<script>
    // Sistema de Escaneo - CosmicGemLogistic
    function escanearRuta() {
        const status = document.getElementById("status");
        status.innerHTML = ">>>> ESCANEANDO RUTA SOBERANA...";
        
        setTimeout(() => {
            const ganancia = (Math.random() * 100).toFixed(2);
            status.innerHTML = ">>>> RUTA VALIDADA - GANANCIA ESTIMADA: " + ganancia + " ETH";
            console.log("Estado: OPERATIVO - Operador: carlin-moker");
        }, 2500);
    }

    // Lógica de Conexión
    async function conectarSoberano() {
        const status = document.getElementById("status");
        try {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            status.innerHTML = ">>>> CONECTADO: " + accounts[0];
        } catch(e) {
            status.innerHTML = ">>>> ERROR DE CONEXIÓN: " + e.message;
        }
    }
</script>
